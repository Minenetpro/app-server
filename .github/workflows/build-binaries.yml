name: Build Binaries

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          OS="$(echo '${{ runner.os }}' | tr '[:upper:]' '[:lower:]')"
          ARCH="$(echo '${{ runner.arch }}' | tr '[:upper:]' '[:lower:]')"
          bun build --compile index.ts --outfile "dist/minenet-app-server-${OS}-${ARCH}"

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $os = "${{ runner.os }}".ToLower()
          $arch = "${{ runner.arch }}".ToLower()
          bun build --compile index.ts --outfile "dist/minenet-app-server-$os-$arch.exe"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-server-${{ runner.os }}-${{ runner.arch }}
          path: dist/minenet-app-server-*
          if-no-files-found: error
